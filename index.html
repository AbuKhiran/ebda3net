<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إبداع نت | لوحة التحكم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #020617; color: #f1f5f9; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-4">

    <!-- لوحة عرض الأخطاء -->
    <div id="error-display" class="hidden bg-red-600 text-white p-4 rounded-xl mb-4 text-center font-bold"></div>

    <div class="max-w-7xl mx-auto">
        <h1 class="text-2xl font-bold mb-4">لوحة تحكم إبداع نت</h1>
        
        <!-- ملخص -->
        <div id="stats-container" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>

        <!-- الجدول -->
        <div class="glass rounded-2xl overflow-hidden">
            <table class="w-full text-right">
                <thead class="bg-slate-900 text-slate-400 text-xs">
                    <tr><th class="p-4">الوقت</th><th class="p-4">النوع</th><th class="p-4">المستخدم</th></tr>
                </thead>
                <tbody id="logs-tbody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // ضع قيمك هنا
        const SUPABASE_URL = "https://iuokwfigwuebutctaxli.supabase.co";
        const SUPABASE_KEY = "sb_publishable_BWoVwRtLPrIXzUNqembCtA_P7To3GW-";

        function showError(msg) {
            const errDiv = document.getElementById('error-display');
            errDiv.classList.remove('hidden');
            errDiv.innerText = "خطأ: " + msg;
        }

        async function init() {
            try {
                // فحص المكتبة
                if (typeof supabase === 'undefined') throw new Error("مكتبة Supabase لم تُحمل");

                const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                
                // جلب البيانات
                const { data, error } = await client
                    .from('network_logs')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                if (!data) throw new Error("لا توجد بيانات راجعة من القاعدة");

                // عرض البيانات
                document.getElementById('logs-tbody').innerHTML = data.map(l => `
                    <tr class="border-b border-slate-800">
                        <td class="p-4 text-xs">${l.created_at.substring(11,16)}</td>
                        <td class="p-4 text-sm">${l.log_type}</td>
                        <td class="p-4 font-bold">${l.username}</td>
                    </tr>
                `).join('');

                // عرض الإحصائيات البسيطة
                document.getElementById('stats-container').innerHTML = `
                    <div class="glass p-4 rounded-xl text-center"><div class="text-xs text-slate-400">إجمالي السجلات</div><div class="text-xl font-bold">${data.length}</div></div>
                `;

            } catch (e) {
                showError(e.message);
                console.error(e);
            }
        }

        init();
    </script>
</body>
</html>
