<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم إبداع نت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 p-8">

    <!-- نافذة الدخول -->
    <div id="login-container" class="max-w-md mx-auto bg-gray-800 p-8 rounded-2xl border border-gray-700">
        <h2 class="text-2xl font-bold mb-6 text-teal-400">تسجيل الدخول</h2>
        <input id="user" type="text" placeholder="اسم المستخدم" class="w-full bg-gray-900 p-3 mb-4 rounded border border-gray-700">
        <input id="pass" type="password" placeholder="كلمة المرور" class="w-full bg-gray-900 p-3 mb-6 rounded border border-gray-700">
        <button onclick="login()" class="w-full bg-teal-600 py-3 rounded font-bold hover:bg-teal-500">دخول</button>
    </div>

    <!-- الداشبورد (يظهر بعد الدخول) -->
    <div id="dashboard" class="hidden">
        <h1 class="text-3xl font-bold mb-6">مرحباً بك في الداشبورد</h1>
        <div id="logs" class="bg-gray-800 p-4 rounded-xl border border-gray-700"></div>
    </div>

    <script>
        // 1. ضع مفاتيحك هنا في جهازك فقط ولا ترفعها على GitHub
       const SUPABASE_URL = "https://iuokwfigwuebutctaxli.supabase.co";
const SUPABASE_KEY = "sb_publishable_BWoVwRtLPrIXzUNqembCtA_P7To3GW-";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function login() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            const { data, error } = await supabase
                .from('system_users')
                .select('*')
                .eq('username', user)
                .eq('password', pass)
                .single();

            if (data) {
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                fetchLogs();
            } else {
                alert('خطأ في البيانات!');
            }
        }

        async function fetchLogs() {
            const { data } = await supabase.from('network_logs').select('*').limit(20);
            document.getElementById('logs').innerHTML = JSON.stringify(data);
        }
    </script>
</body>
</html>
