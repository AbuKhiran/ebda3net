<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebda3 Net - لوحة المراقبة الحية</title>
    <!-- مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --border-color: #334155;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }
        h1 {
            margin: 0;
            font-size: 24px;
            color: #38bdf8;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .card h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: var(--text-muted);
        }
        .card .value {
            font-size: 22px;
            font-weight: bold;
        }
        .controls {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .controls button, .controls select {
            padding: 8px 15px;
            background-color: #334155;
            color: white;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            cursor: pointer;
        }
        .controls button.active {
            background-color: #0284c7;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        th, td {
            padding: 12px 15px;
            text-align: right;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            background-color: #1e293b;
            color: var(--text-muted);
        }
        tr:last-child td {
            border-bottom: none;
        }
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge.online {
            background-color: rgba(34, 197, 94, 0.2);
            color: var(--accent-green);
        }
        .badge.offline {
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
        }
        @keyframes highlightNew {
            0% { background-color: rgba(56, 189, 248, 0.4); }
            100% { background-color: transparent; }
        }
        .new-row {
            animation: highlightNew 2s ease-out;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Ebda3 Net - لوحة المراقبة الحية</h1>
            <div id="connection-status" class="badge offline">جاري الاتصال بقاعدة البيانات...</div>
        </header>

        <!-- الإحصائيات -->
        <div class="stats-grid">
            <div class="card">
                <h3>إجمالي السجلات المعروضة</h3>
                <div class="value" id="total-logs">0</div>
            </div>
            <div class="card">
                <h3>الحالة الحالية</h3>
                <div class="value" id="current-status">--</div>
            </div>
        </div>

        <!-- أدوات التحكم والفلترة -->
        <div class="controls">
            <span>فلترة حسب الحالة:</span>
            <button class="active filter-btn" onclick="filterLogs('all', this)">الكل</button>
            <button class="filter-btn" onclick="filterLogs('online', this)">المتصلون فقط</button>
            <button class="filter-btn" onclick="filterLogs('offline', this)">المنفصلون فقط</button>
        </div>

        <!-- الجدول -->
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>اسم المشترك / الجهاز</th>
                    <th>الحالة</th>
                    <th>وقت الحدث</th>
                    <th>ملاحظات / تفاصيل</th>
                </tr>
            ​</thead>
            <tbody id="logs-table-body">
                <tr>
                    <td colspan="5" style="text-align: center; color: var(--text-muted);">جاري تحميل البيانات...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const SUPABASE_URL = "https://iuokwfigwuebutctaxli.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_BWoVwRtLPrIXzUNqembCtA_P7To3GW-";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allLogsData = [];
        let currentFilter = 'all';

        // دالة وهمية لمحاكاة البيانات أو ربطها بقاعدتك القديمة
        function loadInitialData() {
            // استبدل هذا الجزء بكود جلب البيانات القديم الخاص بك من Supabase
            // مثال هيكلي:
            /*
            const { data, error } = await supabaseClient.from('your_table_name').select('*');
            if(!error) {
                allLogsData = data;
                renderTable();
            }
            */
        }

        function filterLogs(status, btn) {
            currentFilter = status;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('logs-table-body');
            tbody.innerHTML = '';

            let filtered = allLogsData;
            if (currentFilter === 'online') {
                filtered = allLogsData.filter(item => item.status === 'online');
            } else if (currentFilter === 'offline') {
                filtered = allLogsData.filter(item => item.status === 'offline');
            }

            document.getElementById('total-logs').innerText = filtered.length;

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">لا توجد بيانات مطابقة</td></tr>`;
                return;
            }

            filtered.forEach((item, index) => {
                const tr = document.createElement('tr');
                if(item.isNew) {
                    tr.classList.add('new-row');
                }
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${item.username || 'غير معروف'}</td>
                    <td><span class="badge ${item.status === 'online' ? 'online' : 'offline'}">${item.status === 'online' ? 'متصل' : 'منفصل'}</span></td>
                    <td>${item.time || '--'}</td>
                    <td>${item.notes || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
