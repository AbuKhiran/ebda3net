<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إبداع نت | لوحة التحكم الإدارية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0b0e14; --glass: rgba(255, 255, 255, 0.03); }
        body { background-color: var(--bg); color: #e2e8f0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .select-style { background: #1a1f2e; border: 1px solid #334155; }
        tr:nth-child(even) { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-80 glass-panel p-6 flex flex-col border-l border-white/5">
        <div class="mb-10 text-center">
            <h1 class="text-2xl font-black text-blue-500">إبداع نت</h1>
            <p class="text-xs text-slate-500 mt-2 tracking-widest">NETWORK OPERATIONS CENTER</p>
        </div>
        
        <div id="filters-container" class="space-y-6 flex-1 overflow-y-auto">
            <!-- الفلاتر ستظهر هنا -->
        </div>

        <button onclick="clearAll()" class="mt-6 w-full py-3 bg-red-900/20 text-red-400 border border-red-900/50 rounded-xl hover:bg-red-900/40 transition">إعادة ضبط الكل</button>
    </aside>

    <!-- Content -->
    <main class="flex-1 flex flex-col p-8">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold">سجل العمليات اللحظي</h2>
            <div id="stats-badge" class="px-4 py-2 bg-blue-500/10 text-blue-400 rounded-lg text-sm border border-blue-500/20">جاري التحميل...</div>
        </div>

        <div class="glass-panel flex-1 rounded-2xl overflow-hidden shadow-2xl flex flex-col">
            <div class="overflow-y-auto flex-1">
                <table class="w-full text-right border-collapse">
                    <thead class="sticky top-0 bg-[#161a22] text-slate-400 text-xs uppercase">
                        <tr id="table-head"></tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const URL = "https://iuokwfigwuebutctaxli.supabase.co";
        const KEY = "sb_publishable_BWoVwRtLPrIXzUNqembCtA_P7To3GW-";
        const supabase = supabase.createClient(URL, KEY);
        
        let allData = [];
        const columns = ['created_at', 'log_type', 'username', 'message'];

        async function init() {
            try {
                const { data, error } = await supabase.from('network_logs').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                allData = data || [];
                buildFilters();
                renderTable(allData);
            } catch (e) {
                document.getElementById('stats-badge').innerText = "خطأ اتصال: " + e.message;
            }
        }

        function buildFilters() {
            const container = document.getElementById('filters-container');
            document.getElementById('table-head').innerHTML = columns.map(c => `<th class="p-4 font-bold">${c.toUpperCase()}</th>`).join('');
            
            columns.forEach(col => {
                const uniqueValues = [...new Set(allData.map(item => item[col]))].filter(Boolean).slice(0, 50);
                container.innerHTML += `
                    <div>
                        <label class="block text-[10px] uppercase text-slate-500 mb-2 font-bold">${col.replace('_', ' ')}</label>
                        <select onchange="applyFilters()" data-col="${col}" class="filter-input w-full select-style p-3 rounded-lg text-sm outline-none focus:border-blue-500">
                            <option value="">جميع الخيارات</option>
                            ${uniqueValues.map(v => `<option value="${v}">${v}</option>`).join('')}
                        </select>
                    </div>
                `;
            });
        }

        function applyFilters() {
            const filters = document.querySelectorAll('.filter-input');
            const filtered = allData.filter(item => {
                return Array.from(filters).every(f => !f.value || item[f.getAttribute('data-col')] == f.value);
            });
            renderTable(filtered);
        }

        function renderTable(data) {
            document.getElementById('table-body').innerHTML = data.map(item => `
                <tr class="hover:bg-blue-500/5 transition">
                    ${columns.map(c => `<td class="p-4 text-sm">${item[c] || '-'}</td>`).join('')}
                </tr>
            `).join('');
            document.getElementById('stats-badge').innerText = data.length + " سجل متوفر";
        }

        function clearAll() {
            document.querySelectorAll('.filter-input').forEach(f => f.value = "");
            renderTable(allData);
        }

        init();
    </script>
</body>
</html>
