<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم ابداع نت | الإدارة الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="text-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-white">لوحة تحكم إبداع نت</h1>
            <p class="text-gray-400">مراقبة لحظية لبيانات الشبكة</p>
        </header>

        <!-- Stats -->
        <section class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8" id="stats-container">
            <!-- سيتم ملؤها بواسطة JavaScript -->
        </section>

        <!-- Filters -->
        <section class="glass p-4 rounded-2xl mb-6 grid grid-cols-1 md:grid-cols-3 gap-4">
            <input id="filter-user" oninput="applyFilters()" placeholder="بحث باسم المستخدم..." class="bg-slate-950 border border-slate-700 rounded-xl p-3 outline-none focus:border-blue-500">
            <select id="filter-type" onchange="applyFilters()" class="bg-slate-950 border border-slate-700 rounded-xl p-3 outline-none">
                <option value="">كل الأنواع</option>
                <option value="PPP Connect">اتصال (Connect)</option>
                <option value="PPP Disconnect">قطع (Disconnect)</option>
                <option value="System Error">أخطاء (Errors)</option>
            </select>
            <select id="filter-date" onchange="applyFilters()" class="bg-slate-950 border border-slate-700 rounded-xl p-3 outline-none">
                <option value="today">اليوم فقط</option>
                <option value="all">كل التواريخ</option>
            </select>
        </section>

        <!-- Table -->
        <div class="glass rounded-2xl overflow-hidden">
            <table class="w-full text-right border-collapse">
                <thead class="bg-slate-950/50 text-gray-400 text-xs uppercase tracking-wider">
                    <tr><th class="p-4">التاريخ</th><th class="p-4">النوع</th><th class="p-4">المستخدم</th><th class="p-4">الرسالة</th></tr>
                </thead>
                <tbody id="logs-tbody" class="divide-y divide-slate-700/50">
                    <tr><td colspan="4" class="p-8 text-center text-gray-500">جاري تحميل البيانات...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://iuokwfigwuebutctaxli.supabase.co";
        const SUPABASE_KEY = "sb_publishable_BWoVwRtLPrIXzUNqembCtA_P7To3GW-";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let allLogs = [];

        async function fetchData() {
            const { data } = await supabaseClient.from('network_logs').select('*').order('created_at', { ascending: false });
            allLogs = data || [];
            updateDateFilter();
            applyFilters();
        }

        function updateStats() {
            const connects = allLogs.filter(l => l.log_type === 'PPP Connect').length;
            const disconnects = allLogs.filter(l => l.log_type === 'PPP Disconnect');
            const errors = allLogs.filter(l => l.log_type === 'System Error' || l.log_type === 'Link Down').length;
            
            // حساب الأكثر فصلاً
            const counts = {};
            disconnects.forEach(d => counts[d.username] = (counts[d.username] || 0) + 1);
            const topUser = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b, '---');

            document.getElementById('stats-container').innerHTML = `
                ${statBox('المتصلين', connects, 'text-emerald-400')}
                ${statBox('قطع الاتصال', disconnects.length, 'text-amber-400')}
                ${statBox('الأكثر فصلاً', topUser, 'text-red-400', 'text-lg')}
                ${statBox('أخطاء النظام', errors, 'text-rose-500')}
            `;
        }

        function statBox(title, val, color, size='text-3xl') {
            return `<div class="glass p-5 rounded-2xl">
                <div class="text-gray-400 text-sm">${title}</div>
                <div class="${size} font-bold ${color} mt-2">${val}</div>
            </div>`;
        }

        function updateDateFilter() {
            const select = document.getElementById('filter-date');
            const dates = [...new Set(allLogs.map(l => l.created_at.split('T')[0]))].sort().reverse();
            dates.forEach(d => select.innerHTML += `<option value="${d}">${d}</option>`);
        }

        function applyFilters() {
            const userQ = document.getElementById('filter-user').value.toLowerCase();
            const typeQ = document.getElementById('filter-type').value;
            const dateQ = document.getElementById('filter-date').value;
            const today = new Date().toISOString().split('T')[0];

            const filtered = allLogs.filter(log => {
                const matchDate = dateQ === 'today' ? log.created_at.startsWith(today) : (dateQ === 'all' ? true : log.created_at.startsWith(dateQ));
                const matchType = typeQ ? log.log_type === typeQ : true;
                return matchDate && matchType && (log.username?.toLowerCase().includes(userQ) || '');
            });

            render(filtered);
            updateStats();
        }

        function render(data) {
            const tbody = document.getElementById('logs-tbody');
            tbody.innerHTML = data.map(log => `
                <tr class="hover:bg-slate-700/20 transition">
                    <td class="p-4 text-xs text-gray-400">${log.created_at.split('T')[1].substring(0,5)}</td>
                    <td class="p-4 font-semibold">${log.log_type}</td>
                    <td class="p-4 text-blue-400">${log.username}</td>
                    <td class="p-4 text-gray-300 text-sm">${log.message}</td>
                </tr>
            `).join('');
        }

        fetchData();
    </script>
</body>
</html>
