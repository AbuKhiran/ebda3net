<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إبداع نت | لوحة التحكم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- مكتبة سوبابيس -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: #e2e8f0; font-family: sans-serif; }
    </style>
</head>
<body class="p-10">

    <!-- لوحة التنبيه بالأخطاء -->
    <div id="debug-box" class="hidden bg-red-900 border border-red-500 text-white p-6 rounded-2xl mb-6 shadow-2xl">
        <h2 class="font-bold text-lg">⚠️ يوجد خطأ في تشغيل اللوحة:</h2>
        <p id="error-msg" class="mt-2 text-sm opacity-80"></p>
    </div>

    <div id="content" class="opacity-0 transition-opacity duration-1000">
        <h1 class="text-2xl font-bold mb-6">لوحة تحكم إبداع نت</h1>
        <div id="status" class="text-blue-400">جاري فحص الاتصال...</div>
    </div>

    <script>
        // 1. المتغيرات
        const URL = "https://iuokwfigwuebutctaxli.supabase.co";
        const KEY = "sb_publishable_BWoVwRtLPrIXzUNqembCtA_P7To3GW-";

        function reportError(msg) {
            document.getElementById('debug-box').classList.remove('hidden');
            document.getElementById('error-msg').innerText = msg;
        }

        async function init() {
            try {
                // فحص هل المكتبة موجودة؟
                if (typeof supabase === 'undefined') throw new Error("مكتبة Supabase لم تُحمل، تأكد من اتصال الإنترنت أو الرابط.");

                const client = supabase.createClient(URL, KEY);
                document.getElementById('status').innerText = "جاري جلب البيانات من السيرفر...";

                // جلب البيانات
                const { data, error } = await client.from('network_logs').select('*');
                
                if (error) throw new Error("خطأ من سوبابيس: " + error.message);
                
                // إذا وصلنا هنا، الاتصال ناجح
                document.getElementById('content').classList.remove('opacity-0');
                document.getElementById('status').innerText = "تم الاتصال بنجاح! عدد السجلات: " + data.length;
                console.log("البيانات المستلمة:", data);

            } catch (e) {
                reportError(e.message);
            }
        }

        // تشغيل
        init();
    </script>
</body>
</html>
